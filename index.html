<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC Store</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div class="header">
        <div class="top">
            <img src="https://www.freeiconspng.com/thumbs/menu-icon/menu-icon-24.png" width="22px">
            <div class="logo">

            <img src="https://www.freeiconspng.com/thumbs/cart-icon/basket-cart-icon-27.png" width="22px">
        </div>
        <div class="bottom">
            <input id="search" type="text" placeholder="Search">
        </div>
    </div>

    <div class="mid">
        <p id="sptxt">Best Selling Products</p>
        <div class="products">
            <div class="top-products">

                    <img class="prd" id="prd1" src="https://m.media-amazon.com/images/I/81drOrfKBBL._AC_SX679_.jpg" width="160px">
                    <p class="product-title">Wahl Home Pro Cordless Hair Clipper Kit (13pc)</p>
                    <p class="price">R799.99</p>

                <div class="prod">
                    <img class="prd" id="prd2" src="https://encrypted-tbn3.gstatic.com/shopping?q=tbn:ANd9GcQncyHlCejYtH-0hi9ihv-M80-SLvKn6v3LSxfWYKyKZbLBiBEjsCb5BxpV9qAZDIfhpQ12VuNZuvU_96MpYODHkyt0_61UsrOWjKooT5k&usqp=CAc" width="160px">

                    <p class="price">R149.99</p>
                </div>
                <div class="prod">
                    <img class="prd" id="prd3" src="https://encrypted-tbn1.gstatic.com/shopping?q=tbn:ANd9GcRU2kMIku1nsnUvVNSolxYfsaqMlma7NADzgoDrgpISteRd6WC6NisPnmIN5GFAuLA3T3DAqcqiAGVypwaoV6wYM7D0ppl6XzeuApQFHwg&usqp=CAc" width="160px">
                    <p class="product-title">Wahl Home Pro Cordless Hair Clipper Kit (13pc)</p>

            </div>
            
            <div class="bottom-products">
                <div class="prod">
                    <img class="prd" id="prd4" src="https://encrypted-tbn1.gstatic.com/shopping?q=tbn:ANd9GcTY7yGVZEDi_S8A6too-JH3BHQCbcVVwngMiASkVLj-6_iENie8G1Ny58z70V42TY50nNkQ5FcbTHmGxbezl21xWt8G36N1sbuH7hfRDLnwMHQ&usqp=CAc" width="160px">
                    <p class="price">R79.99</p>
                </div>
                <div class="prod">
                    <img class="prd" id="prd5" src="https://encrypted-tbn2.gstatic.com/shopping?q=tbn:ANd9GcQ6Ek4u3U_hw5mkZGmVEc_-U3EpZM97gqA46tjYpkHGgbLTmZZLKeDy9U7b-dFIvaMCUnjUBDHtePqDdCouMOq4w8Qxr7tH_9Yj21zcYM_9bdc&usqp=CAc" width="160px">

</html>
